name: Main Build

on:
  push:
    branches: [ main ]

env:
  # Kept in sync with S3ProxyContainers.IMAGE; see cli/s3/parquet-java-compat tests.
  S3PROXY_IMAGE: ghcr.io/hardwood-hq/s3proxy:sha-6597ca59cd5c5fa8ee313e13d349d507cc6090c3

jobs:
  build-core:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 'Check out repository'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6 — https://github.com/actions/checkout/releases/tag/v6
        with:
          submodules: 'true'

      - name: 'Set up Java'
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5 — https://github.com/actions/setup-java/releases/tag/v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: 'Cache Maven dependencies'
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5 — https://github.com/actions/cache/releases/tag/v5
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ github.job }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-${{ github.job }}-
            maven-${{ runner.os }}-build-
            maven-${{ runner.os }}-

      - name: 'Build and install BOMs, test-support, core and avro'
        run: ./mvnw -B clean install -pl :hardwood-error-prone-checks,:hardwood-bom,:hardwood-test-bom,:hardwood-test-support,:hardwood-core,:hardwood-avro

      - name: 'Upload built artifacts'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7 — https://github.com/actions/upload-artifact/releases/tag/v7
        with:
          name: maven-repo-core
          path: |
            ~/.m2/repository/dev/hardwood/hardwood-error-prone-checks/
            ~/.m2/repository/dev/hardwood/hardwood-bom/
            ~/.m2/repository/dev/hardwood/hardwood-test-bom/
            ~/.m2/repository/dev/hardwood/hardwood-test-support/
            ~/.m2/repository/dev/hardwood/hardwood-core/
            ~/.m2/repository/dev/hardwood/hardwood-avro/
          retention-days: 1

  build-s3:
    needs: build-core
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 'Check out repository'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6 — https://github.com/actions/checkout/releases/tag/v6
        with:
          submodules: 'true'

      - name: 'Pre-pull s3proxy image in background'
        # Start the image download immediately after checkout so it overlaps
        # with setup-java, Maven cache restore, and artifact download.
        # By the time Testcontainers reaches `s3.start()`, layers are cached.
        run: |
          nohup docker pull "$S3PROXY_IMAGE" > /tmp/s3proxy-pull.log 2>&1 &
          disown
          echo "Background pull of $S3PROXY_IMAGE started"

      - name: 'Set up Java'
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5 — https://github.com/actions/setup-java/releases/tag/v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: 'Cache Maven dependencies'
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5 — https://github.com/actions/cache/releases/tag/v5
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ github.job }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-${{ github.job }}-
            maven-${{ runner.os }}-build-core-
            maven-${{ runner.os }}-

      - name: 'Download core artifacts'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8 — https://github.com/actions/download-artifact/releases/tag/v8
        with:
          name: maven-repo-core
          path: ~/.m2/repository/dev/hardwood/

      - name: 'Build and install s3 and aws-auth'
        run: ./mvnw -B clean install -pl :hardwood-s3,:hardwood-aws-auth

      - name: 'Upload built artifacts'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7 — https://github.com/actions/upload-artifact/releases/tag/v7
        with:
          name: maven-repo-s3
          path: |
            ~/.m2/repository/dev/hardwood/hardwood-s3/
            ~/.m2/repository/dev/hardwood/hardwood-aws-auth/
          retention-days: 1

  build-cli:
    needs: build-s3
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 'Check out repository'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6 — https://github.com/actions/checkout/releases/tag/v6
        with:
          submodules: 'true'

      - name: 'Pre-pull s3proxy image in background'
        run: |
          nohup docker pull "$S3PROXY_IMAGE" > /tmp/s3proxy-pull.log 2>&1 &
          disown
          echo "Background pull of $S3PROXY_IMAGE started"

      - name: 'Set up Java'
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5 — https://github.com/actions/setup-java/releases/tag/v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: 'Cache Maven dependencies'
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5 — https://github.com/actions/cache/releases/tag/v5
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ github.job }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-${{ github.job }}-
            maven-${{ runner.os }}-build-s3-
            maven-${{ runner.os }}-build-core-
            maven-${{ runner.os }}-

      - name: 'Download core and s3 artifacts'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8 — https://github.com/actions/download-artifact/releases/tag/v8
        with:
          pattern: maven-repo-{core,s3}
          path: ~/.m2/repository/dev/hardwood/
          merge-multiple: true

      - name: 'Build and install cli'
        run: ./mvnw -B clean install -pl :hardwood-cli

      - name: 'Upload built artifacts'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7 — https://github.com/actions/upload-artifact/releases/tag/v7
        with:
          name: maven-repo-cli
          path: ~/.m2/repository/dev/hardwood/hardwood-cli/
          retention-days: 1

  build-parquet-java-compat:
    needs: build-s3
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 'Check out repository'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6 — https://github.com/actions/checkout/releases/tag/v6
        with:
          submodules: 'true'

      - name: 'Pre-pull s3proxy image in background'
        run: |
          nohup docker pull "$S3PROXY_IMAGE" > /tmp/s3proxy-pull.log 2>&1 &
          disown
          echo "Background pull of $S3PROXY_IMAGE started"

      - name: 'Set up Java'
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5 — https://github.com/actions/setup-java/releases/tag/v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: 'Cache Maven dependencies'
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5 — https://github.com/actions/cache/releases/tag/v5
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ github.job }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-${{ github.job }}-
            maven-${{ runner.os }}-build-s3-
            maven-${{ runner.os }}-build-core-
            maven-${{ runner.os }}-

      - name: 'Download core and s3 artifacts'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8 — https://github.com/actions/download-artifact/releases/tag/v8
        with:
          pattern: maven-repo-{core,s3}
          path: ~/.m2/repository/dev/hardwood/
          merge-multiple: true

      - name: 'Build and install parquet-java-compat'
        run: ./mvnw -B clean install -pl :hardwood-parquet-java-compat

      - name: 'Upload built artifacts'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7 — https://github.com/actions/upload-artifact/releases/tag/v7
        with:
          name: maven-repo-parquet-java-compat
          path: ~/.m2/repository/dev/hardwood/hardwood-parquet-java-compat/
          retention-days: 1

  build-parquet-testing-runner:
    needs: build-core
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 'Check out repository'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6 — https://github.com/actions/checkout/releases/tag/v6
        with:
          submodules: 'true'

      - name: 'Set up Java'
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5 — https://github.com/actions/setup-java/releases/tag/v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: 'Cache Maven dependencies'
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5 — https://github.com/actions/cache/releases/tag/v5
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ github.job }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-${{ github.job }}-
            maven-${{ runner.os }}-build-core-
            maven-${{ runner.os }}-

      - name: 'Download core artifacts'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8 — https://github.com/actions/download-artifact/releases/tag/v8
        with:
          name: maven-repo-core
          path: ~/.m2/repository/dev/hardwood/

      - name: 'Build and install parquet-testing-runner'
        run: ./mvnw -B clean install -pl :hardwood-parquet-testing-runner

      - name: 'Upload built artifacts'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7 — https://github.com/actions/upload-artifact/releases/tag/v7
        with:
          name: maven-repo-parquet-testing-runner
          path: ~/.m2/repository/dev/hardwood/hardwood-parquet-testing-runner/
          retention-days: 1

  javadoc:
    needs: [build-cli, build-parquet-java-compat, build-parquet-testing-runner]
    runs-on: ubuntu-latest

    steps:
      - name: 'Check out repository'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6 — https://github.com/actions/checkout/releases/tag/v6
        with:
          submodules: 'true'

      - name: 'Set up Java'
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5 — https://github.com/actions/setup-java/releases/tag/v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: 'Cache Maven dependencies'
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5 — https://github.com/actions/cache/releases/tag/v5
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ github.job }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-${{ github.job }}-
            maven-${{ runner.os }}-build-core-
            maven-${{ runner.os }}-

      - name: 'Download built artifacts'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8 — https://github.com/actions/download-artifact/releases/tag/v8
        with:
          pattern: maven-repo-*
          path: ~/.m2/repository/dev/hardwood/
          merge-multiple: true

      - name: 'Generate Javadoc'
        run: ./mvnw -B javadoc:javadoc

  integration-tests:
    needs: build-core
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: 'Integration Tests'

    steps:
      - name: 'Check out repository'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6 — https://github.com/actions/checkout/releases/tag/v6
        with:
          submodules: 'true'

      - name: 'Set up Java'
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5 — https://github.com/actions/setup-java/releases/tag/v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 'Cache Maven dependencies'
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5 — https://github.com/actions/cache/releases/tag/v5
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ github.job }}-java21-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-${{ github.job }}-java21-
            maven-${{ runner.os }}-${{ github.job }}-
            maven-${{ runner.os }}-build-core-
            maven-${{ runner.os }}-

      - name: 'Download core artifacts'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8 — https://github.com/actions/download-artifact/releases/tag/v8
        with:
          name: maven-repo-core
          path: ~/.m2/repository/dev/hardwood/

      - name: 'Run integration tests'
        run: ./mvnw -B verify -pl :hardwood-integration-test

  api-change-report:
    needs: build-core
    runs-on: ubuntu-latest

    steps:
      - name: 'Check out repository'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6 — https://github.com/actions/checkout/releases/tag/v6
        with:
          submodules: 'true'

      - name: 'Set up Java'
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5 — https://github.com/actions/setup-java/releases/tag/v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: 'Cache Maven dependencies'
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5 — https://github.com/actions/cache/releases/tag/v5
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ github.job }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-${{ github.job }}-
            maven-${{ runner.os }}-build-core-
            maven-${{ runner.os }}-

      - name: 'Download core artifacts'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8 — https://github.com/actions/download-artifact/releases/tag/v8
        with:
          name: maven-repo-core
          path: ~/.m2/repository/dev/hardwood/

      - name: 'Generate API change report'
        run: |
          JAPICMP_OLD_VERSION="$(sed -n 's/^Latest version: \([^,]*\),.*/\1/p' README.md)"
          echo "Comparing against ${JAPICMP_OLD_VERSION}"
          ./mvnw -ntp -B package japicmp:cmp -pl :hardwood-core -DskipTests -Djapicmp.oldVersion="${JAPICMP_OLD_VERSION}"

      - name: 'Upload API change report'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7 — https://github.com/actions/upload-artifact/releases/tag/v7
        with:
          name: japicmp-report
          path: core/target/japicmp/
